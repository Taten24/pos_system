{% extends 'base.html' %}
{% block content %}
<h2>Audit Logs</h2>
<div class="card bg-black bg-opacity-25 card-soft"><div class="card-body"><div class="table-responsive">
<table class="table table-dark table-striped"><thead><tr><th>Date</th><th>Action</th><th>Entity</th><th>Description</th></tr></thead><tbody>
{% for log in logs %}
<tr><td>{{ log.created_at }}</td><td>{{ log.action_type }}</td><td>{{ log.entity_type }}</td><td>{{ log.description }}</td></tr>
{% endfor %}
</tbody></table></div></div></div>
{% endblock %}
