{% extends 'base.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-center"><h2>{{ tenant.business_name }} Branches</h2></div>
<div class="row mt-3 g-4">
<div class="col-lg-5">
<div class="card bg-black bg-opacity-25 card-soft"><div class="card-body">
<h4>Add Branch</h4>
<form method="post" class="row g-2">
<div class="col-12"><input name="name" class="form-control" placeholder="Branch name" required></div>
<div class="col-md-6"><input name="code" class="form-control" placeholder="Code"></div>
<div class="col-md-6"><input name="phone" class="form-control" placeholder="Phone"></div>
<div class="col-12"><input name="email" class="form-control" placeholder="Email"></div>
<div class="col-12"><input name="address" class="form-control" placeholder="Address"></div>
<div class="col-12"><button class="btn btn-brand">Add Branch</button></div>
</form>
</div></div></div>
<div class="col-lg-7">
<div class="card bg-black bg-opacity-25 card-soft"><div class="card-body">
<table class="table table-dark table-striped"><thead><tr><th>Name</th><th>Code</th><th>Status</th><th>Action</th></tr></thead><tbody>
{% for b in tenant.branches %}
<tr><td>{{ b.name }}</td><td>{{ b.code }}</td><td>{{ b.status }}</td>
<td class="d-flex gap-1 flex-wrap">
<a class="btn btn-sm btn-success" href="{{ url_for('toggle_branch_status', branch_id=b.id, status='active') }}">Activate</a>
<a class="btn btn-sm btn-warning" href="{{ url_for('toggle_branch_status', branch_id=b.id, status='paused') }}">Pause</a>
<a class="btn btn-sm btn-danger" href="{{ url_for('toggle_branch_status', branch_id=b.id, status='frozen') }}">Freeze</a>
</td></tr>
{% endfor %}
</tbody></table></div></div></div></div>
{% endblock %}
