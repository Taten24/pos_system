{% extends 'base.html' %}
{% block content %}
<div class="row g-4">
<div class="col-lg-4"><div class="card bg-black bg-opacity-25 card-soft"><div class="card-body">
<h3>Add Category</h3>
<form method="post">
<div class="mb-2"><input name="name" class="form-control" placeholder="Category name" required></div>
<div class="mb-2"><input name="description" class="form-control" placeholder="Description"></div>
<button class="btn btn-brand">Save</button>
</form></div></div></div>
<div class="col-lg-8"><div class="card bg-black bg-opacity-25 card-soft"><div class="card-body">
<h3>Categories</h3><table class="table table-dark table-striped"><thead><tr><th>Name</th><th>Description</th></tr></thead><tbody>
{% for c in categories %}<tr><td>{{ c.name }}</td><td>{{ c.description }}</td></tr>{% endfor %}
</tbody></table></div></div></div></div>
{% endblock %}
