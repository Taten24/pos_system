{% extends 'base.html' %}
{% block content %}
<div class="row g-4">
<div class="col-lg-4"><div class="card bg-black bg-opacity-25 card-soft"><div class="card-body">
<h3>Add Expense</h3>
<form method="post">
<div class="mb-2"><select name="branch_id" class="form-select">{% for b in branches %}<option value="{{ b.id }}">{{ b.name }}</option>{% endfor %}</select></div>
<div class="mb-2"><input name="category" class="form-control" placeholder="Category" required></div>
<div class="mb-2"><input name="amount" type="number" step="0.01" class="form-control" placeholder="Amount" required></div>
<div class="mb-2"><select name="payment_method" class="form-select"><option>cash</option><option>card</option><option>mobile_money</option></select></div>
<div class="mb-2"><input name="expense_date" type="date" class="form-control" value="{{ today }}"></div>
<div class="mb-2"><input name="note" class="form-control" placeholder="Note"></div>
<button class="btn btn-brand">Save Expense</button>
</form></div></div></div>
<div class="col-lg-8"><div class="card bg-black bg-opacity-25 card-soft"><div class="card-body"><h3>Expenses</h3>
<table class="table table-dark table-striped"><thead><tr><th>Date</th><th>Category</th><th>Amount</th><th>Method</th></tr></thead><tbody>
{% for e in expenses %}<tr><td>{{ e.expense_date }}</td><td>{{ e.category }}</td><td>{{ e.amount }}</td><td>{{ e.payment_method }}</td></tr>{% endfor %}
</tbody></table></div></div></div></div>
{% endblock %}
