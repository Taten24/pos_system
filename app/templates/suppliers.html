{% extends 'base.html' %}
{% block content %}
<div class="row g-4">
<div class="col-lg-4"><div class="card bg-black bg-opacity-25 card-soft"><div class="card-body">
<h3>Add Supplier</h3>
<form method="post">
<div class="mb-2"><input name="name" class="form-control" placeholder="Supplier name" required></div>
<div class="mb-2"><input name="phone" class="form-control" placeholder="Phone"></div>
<div class="mb-2"><input name="email" class="form-control" placeholder="Email"></div>
<div class="mb-2"><input name="address" class="form-control" placeholder="Address"></div>
<button class="btn btn-brand">Save Supplier</button>
</form></div></div></div>
<div class="col-lg-8"><div class="card bg-black bg-opacity-25 card-soft"><div class="card-body">
<h3>Suppliers</h3><table class="table table-dark table-striped"><thead><tr><th>Name</th><th>Phone</th><th>Email</th></tr></thead><tbody>
{% for s in suppliers %}<tr><td>{{ s.name }}</td><td>{{ s.phone }}</td><td>{{ s.email }}</td></tr>{% endfor %}
</tbody></table></div></div></div></div>
{% endblock %}
